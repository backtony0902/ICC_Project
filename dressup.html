<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해경 제복 착용 시스템 - RESTORE MISSION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dressup.css">
</head>
<body>

    <div class="game-container">
        <!-- 상단 헤더 -->
        <header class="header">
            <a href="index.html" class="back-btn">← 메인으로</a>
            <h1 class="title">👔 해경 제복 착용 시스템</h1>
            <button id="reset-btn" class="action-btn reset">🔄 초기화</button>
        </header>

        <!-- 메인 콘텐츠 (캐릭터 영역 + 옷 선택 패널) -->
        <main class="main-content">
            <!-- 1. 캐릭터 착용 스테이지 -->
            <div class="stage-container">
                <div class="character-stage" id="character-stage">
                    
                    <!-- 📌 [이미지 위치 1] 기본 베이스 캐릭터 (몸체) -->
                    <!-- 이미지 경로를 본인 파일에 맞게 수정하세요! (예: images/character_base.png) -->
                    <img src="images/character_base.png" alt="캐릭터 베이스" class="layer layer-base" id="base-img">

                    <!-- 레이어 중첩 영역 (클릭 시 자바스크립트가 자동으로 위 레이어에 옷을 입힙니다) -->
                    <img id="layer-shoes" class="layer layer-shoes hidden" src="" alt="신발">
                    <img id="layer-bottom" class="layer layer-bottom hidden" src="" alt="하의">
                    <img id="layer-top" class="layer layer-top hidden" src="" alt="상의">
                    <img id="layer-outer" class="layer layer-outer hidden" src="" alt="아우터">
                    <img id="layer-acc" class="layer layer-acc hidden" src="" alt="악세서리">
                    <img id="layer-hat" class="layer layer-hat hidden" src="" alt="모자">

                </div>
            </div>

            <!-- 2. 옷/아이템 선택 패널 -->
            <div class="panel-container">
                <!-- 카테고리 탭 -->
                <div class="category-tabs">
                    <button class="tab-btn active" data-category="hat">🎩 모자</button>
                    <button class="tab-btn" data-category="top">👔 상의</button>
                    <button class="tab-btn" data-category="bottom">👖 하의</button>
                    <button class="tab-btn" data-category="outer">🦺 아우터</button>
                    <button class="tab-btn" data-category="shoes">👞 신발</button>
                    <button class="tab-btn" data-category="acc">⭐ 악세서리</button>
                </div>

                <!-- 아이템 리스트 그리드 (dressup.js에서 동적으로 생성됨) -->
                <div class="item-grid" id="item-grid"></div>
            </div>
        </main>
    </div>

    <script src="dressup.js"></script>
</body>
</html>
