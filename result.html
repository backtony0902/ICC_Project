<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTORE MISSION 01 - 미션 결과</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <div class="result-container">
        <div class="result-header">
            <span class="badge">MISSION COMPLETE</span>
            <h1 class="title">시스템 복원 결과</h1>
            <div class="score-display">
                <span class="score-label">최종 복원율</span>
                <span id="final-score" class="score-value">0%</span>
            </div>
            <div id="grade-badge" class="grade-badge">판정 중...</div>
        </div>

        <div class="restore-status">
            <h3>해양경찰 5대 핵심 기능 복원 현황</h3>
            <ul id="status-list" class="status-list">
                <!-- JS에서 동적 생성 -->
            </ul>
        </div>

        <div class="btn-group">
            <button id="retry-btn" class="btn secondary">다시 도전하기</button>
            <a href="index.html" class="btn primary">메인 화면으로</a>
        </div>
    </div>

    <script src="result.js"></script>
</body>
</html>
