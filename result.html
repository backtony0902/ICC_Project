<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DR5E2L2XRV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DR5E2L2XRV');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTORE MISSION 01 - 미션 결과</title>
    <link rel="stylesheet" href="result.css">
</head>
<body>
    <audio autoplay loop id="bgm"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <button class="bgm-hint" id="bgm-hint" onclick="document.getElementById('bgm').play().catch(()=>{});this.remove()">🔊 BGM이 있어요, 소리를 켜보세요</button>
    <script>setTimeout(() => {
      const b = document.getElementById('bgm-hint');
      const audio = document.getElementById('bgm');
      if (b && audio && !audio.paused) b.remove();
    }, 5000);</script>

    <div class="result-container">
        <div class="result-header">
            <span class="badge">MISSION COMPLETE</span>
            <h1 class="title">시스템 복원 결과</h1>
            <div class="score-display">
                <span class="score-label">최종 복원율</span>
                <span id="final-score" class="score-value">0%</span>
            </div>
            <div id="grade-badge" class="grade-badge">판정 중...</div>
        </div>

        <div class="restore-status">
            <h3>해양경찰 5대 핵심 기능 복원 현황</h3>
            <ul id="status-list" class="status-list"></ul>
        </div>

        <div class="review-section">
            <h3>상황판단 대응 분석 리포트</h3>
            <div id="review-list" class="review-list"></div>
        </div>

        <div class="btn-group">
            <button id="retry-btn" class="btn secondary">다시 도전하기</button>
            <a href="index.html" class="btn primary">메인 화면으로</a>
        </div>
    </div>

    <script src="result.js"></script>
</body>
</html>
