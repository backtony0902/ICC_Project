<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DR5E2L2XRV"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DR5E2L2XRV');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTORE MISSION 01 - 구조 대응 시스템 복구</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #060b18;
            --border: rgba(70, 130, 220, 0.35);
            --cyan: #4dd9ff;
            --yellow: #f0a500;
            --muted: rgba(160, 196, 255, 0.65);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 메인 허브와 통일된 배경 그리드 */
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                linear-gradient(rgba(30,80,200,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,80,200,0.05) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none; z-index: 1;
        }

        /* 메인 포스터 레이아웃 컨테이너 */
        .cover-container {
            position: relative;
            z-index: 10;
            max-width: 640px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 🖼 thumbnail.png 포스터 프레임 */
        .poster-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid var(--border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(77, 217, 255, 0.2);
            background: rgba(4, 10, 30, 0.8);
            transition: transform 0.3s ease, border-color 0.3s ease;
            cursor: pointer;
        }

        .poster-wrapper:hover {
            transform: translateY(-4px);
            border-color: rgba(77, 217, 255, 0.7);
        }

        /* 이미지 원본 비율 유지 표출 */
        .poster-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* 하단 버튼 영역 */
        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .start-btn {
            width: 100%;
            padding: 18px;
            background: var(--yellow);
            color: #1a0800;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(240, 165, 0, 0.4);
            letter-spacing: 1px;
        }

        .start-btn:hover {
            background: #ffb800;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(240, 165, 0, 0.6);
        }

        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: white;
        }

        .bgm-hint {
            position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 2000;
            margin: 0; padding: 9px 18px; font-size: 13px; font-weight: 700;
            border-radius: 50px; background: rgba(255,255,255,.95); color: #0b132b;
            border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,.18);
            animation: bgmPulse 1.8s ease-in-out infinite;
        }
        .bgm-hint:active { transform: translateX(-50%) scale(0.97); }
        @keyframes bgmPulse { 0%,100%{opacity:1} 50%{opacity:.7} }
    </style>
</head>
<body>
    <audio autoplay loop id="bgm"><source src="bgm.mp3" type="audio/mpeg"></audio>
    <button class="bgm-hint" id="bgm-hint" onclick="document.getElementById('bgm').play().catch(()=>{});this.remove()">🔊 BGM이 있어요, 소리를 켜보세요</button>
    <script>setTimeout(() => {
      const b = document.getElementById('bgm-hint');
      const audio = document.getElementById('bgm');
      if (b && audio && !audio.paused) b.remove();
    }, 5000);</script>

    <div class="cover-container">
        <!-- 이미지 클릭 시에도 게임으로 바로 이동 -->
        <div class="poster-wrapper" onclick="location.href='game.html'">
            <img src="thumbnail.png" alt="RESTORE MISSION 01 썸네일" class="poster-img">
        </div>

        <div class="btn-group">
            <button class="start-btn" onclick="location.href='game.html'">테스트 시작하기 →</button>
            <a href="index.html" class="back-btn">← 메인 화면으로 돌아가기</a>
        </div>
    </div>

</body>
</html>
