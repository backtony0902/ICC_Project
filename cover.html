<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTORE MISSION 01 - 구조 대응 시스템 복구</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #060b18;
            --border: rgba(70, 130, 220, 0.28);
            --cyan: #4dd9ff;
            --yellow: #f0a500;
            --muted: rgba(160, 196, 255, 0.65);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 메인 허브와 동일한 사이버 그리드 배경 */
        body::before {
            content: ''; position: fixed; inset: 0;
            background:
                linear-gradient(rgba(30,80,200,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,80,200,0.05) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none; z-index: 1;
        }

        /* 커버 카드 메인 컨테이너 */
        .cover-card {
            position: relative;
            z-index: 10;
            max-width: 520px;
            width: 100%;
            background: rgba(4, 10, 30, 0.9);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 25px rgba(77, 217, 255, 0.15);
            text-align: center;
        }

        /* 🖼 진입 시 보이는 메인 thumbnail.png 포스터 영역 */
        .thumbnail-box {
            width: 100%;
            max-height: 280px;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .thumbnail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-body {
            padding: 32px 24px;
        }

        .mission-badge {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: var(--cyan);
            margin-bottom: 12px;
            letter-spacing: 1.5px;
        }

        .mission-title {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 14px;
            text-shadow: 0 2px 10px rgba(77, 217, 255, 0.2);
        }

        .mission-desc {
            font-size: 14px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 실제 문항 풀이(game.html)로 이동하는 버튼 */
        .start-btn {
            width: 100%;
            padding: 16px;
            background: var(--yellow);
            color: #1a0800;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(240, 165, 0, 0.35);
        }

        .start-btn:hover {
            background: #ffb800;
            transform: translateY(-2px);
        }

        .back-btn {
            display: inline-block;
            padding: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="cover-card">
        <!-- 🖼 thumbnail.png 적용 위치 -->
        <div class="thumbnail-box">
            <img src="thumbnail.png" alt="RESTORE MISSION 01" class="thumbnail-img">
        </div>

        <div class="card-body">
            <div class="mission-badge">[ RESTORE MISSION 01 ]</div>
            <h1 class="mission-title">구조 대응 시스템 복구</h1>
            <p class="mission-desc">
                해양경찰의 5가지 핵심 대응 시스템이 마비되었습니다.<br>
                현장 위기 상황에서 올바른 판단을 내려 시스템을 복원하세요.
            </p>

            <div class="btn-group">
                <button class="start-btn" onclick="location.href='game.html'">미션 시작하기 →</button>
                <a href="index.html" class="back-btn">← 메인 화면으로 돌아가기</a>
            </div>
        </div>
    </div>

</body>
</html>
