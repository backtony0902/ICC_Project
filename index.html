<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상황판단 테스트</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .list-wrap {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      padding: 40px 20px;
      width: 100%;
      max-width: 800px;
    }

    .list-wrap h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .list-wrap .sub {
      font-size: 16px;
      margin-bottom: 40px;
      opacity: 0.85;
    }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }

    .card {
      width: 200px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255,255,255,0.4);
    }

    .card-thumb {
      width: 100%;
      height: 130px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      /* 이미지 추가 시 아래 주석 해제하고 src 경로 입력 */
      /* background-image: url('images/coast-guard.jpg');
         background-size: cover;
         background-position: center; */
    }

    .card-label {
      padding: 14px 10px;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <audio autoplay loop><source src="bgm.mp3" type="audio/mpeg"></audio>
  <div class="list-wrap">
    <h1>상황판단 테스트</h1>
    <p class="sub">당신이라면 어떤 선택을 하겠습니까?</p>

    <div class="card-grid">

      <!-- 테스트 카드 1 -->
      <div class="card" onclick="location.href='cover.html?test=coast'">
        <div class="card-thumb" style="background-image:url('thumbnail.png'); background-size:cover; background-position:center; font-size:0;"></div>
        <div class="card-label">해양경찰<br>상황판단 테스트</div>
      </div>

      <!-- 테스트 카드 2 -->
      <div class="card" onclick="location.href='mbti.html'">
        <div class="card-thumb" style="background-image:url('thumbnail2.png'); background-size:cover; background-position:center; font-size:0;">
          <span style="font-size:54px; display:none">🌊</span>
        </div>
        <div class="card-label">나의 바다 MBTI<br>심리테스트</div>
      </div>

    </div>
  </div>
</body>
</html>
