<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTORE MISSION 01 - 미션 진행</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="game-container">
        <!-- 상단 진행률 프로그레스 바 -->
        <header class="game-header">
            <div class="header-info">
                <span id="question-count">MISSION 01 / 05</span>
                <span id="restore-rate-text">현재 복원율: 0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
        </header>

        <!-- 문항 카드 -->
        <main class="quiz-card">
            <div class="category-badge">
                <span id="category-icon">🔭</span>
                <span id="category-name">실종자 수색</span>
            </div>
            <p id="situation-text" class="situation-text">상황 설명을 불러오는 중입니다...</p>

            <div id="options-container" class="options-container">
                <!-- 선택지 버튼이 JS로 로드됩니다 -->
            </div>
        </main>
    </div>

    <!-- 이유 안내 피드백 팝업 모달 -->
    <div id="feedback-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div id="feedback-badge" class="feedback-badge">판정 결과</div>
            <h3 id="feedback-title" class="feedback-title">시스템 복원 결과</h3>
            <p id="feedback-reason" class="feedback-reason">판정 이유가 여기에 표시됩니다.</p>
            <button id="next-btn" class="next-btn">다음 미션으로</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="game.js"></script>
</body>
</html>
